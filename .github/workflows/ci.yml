name: "CI"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ⬇️
        uses: actions/checkout@v4.3.1

      - name: Set up Python 🐍
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"

      - name: Install uv 📦
        uses: astral-sh/setup-uv@v5.4.2

      - name: Install dependencies 📦
        run: uv sync --all-extras --dev

      - name: Run tests 🧪
        run: uv run pytest
