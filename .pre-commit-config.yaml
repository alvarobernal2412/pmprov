repos:
  - repo: local
    hooks:
      - id: run-tests
        name: Run test suite
        language: system
        entry: uv run pytest
        pass_filenames: false
        stages: [pre-commit]

      - id: conventional-commit
        name: Conventional commit message (≤45 chars)
        language: system
        entry: uv run python scripts/check_commit_msg.py
        stages: [commit-msg]
